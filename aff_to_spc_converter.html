<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFF → SPC Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #18181f;
    --border: #2a2a38; --border2: #3a3a50;
    --accent: #7c6dfa; --accent2: #a98bff; --accent-glow: rgba(124,109,250,0.18);
    --text: #e8e6f0; --text2: #9996b0; --text3: #5a5870;
    --green: #4ade9a; --red: #f87171; --amber: #fbbf24;
    --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--display); min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(124,109,250,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,109,250,0.03) 1px,transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

  header { position: relative; z-index: 1; padding: 1.5rem 2.5rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1.25rem; }
  .logo-mark { width: 38px; height: 38px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-mark svg { width: 20px; height: 20px; }
  .header-text h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; }
  .header-text p { font-size: 0.7rem; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
  .lang-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .lang-btn { font-family: var(--mono); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; padding: 5px 10px; background: transparent; border: none; color: var(--text3); cursor: pointer; transition: all 0.15s; }
  .lang-btn.active { background: var(--accent); color: white; }
  .badge { font-family: var(--mono); font-size: 0.65rem; color: var(--accent2); background: var(--accent-glow); border: 1px solid rgba(124,109,250,0.3); border-radius: 4px; padding: 4px 10px; letter-spacing: 0.08em; }

  main { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; padding: 1.5rem 2.5rem 2rem; gap: 1.25rem; }

  .settings-bar { display: flex; align-items: center; gap: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1.125rem; flex-wrap: wrap; }
  .setting-group { display: flex; align-items: center; gap: 0.6rem; }
  .setting-label { font-family: var(--mono); font-size: 0.65rem; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .setting-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 0.75rem; padding: 4px 8px; width: 72px; outline: none; transition: border-color 0.15s; }
  .setting-input:focus { border-color: var(--accent); }
  .settings-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  .editor-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; flex: 1; }
  .pane { display: flex; flex-direction: column; gap: 0.5rem; }
  .pane-header { display: flex; align-items: center; gap: 0.75rem; padding: 0 0.25rem; }
  .pane-label { font-family: var(--mono); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
  .pane-tag { font-family: var(--mono); font-size: 0.65rem; padding: 2px 8px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border); color: var(--text3); }
  .pane-tag.input-tag  { color: var(--amber); border-color: rgba(251,191,36,0.25); background: rgba(251,191,36,0.06); }
  .pane-tag.output-tag { color: var(--green);  border-color: rgba(74,222,154,0.25); background: rgba(74,222,154,0.06); }
  .line-count { margin-left: auto; font-family: var(--mono); font-size: 0.65rem; color: var(--text3); }

  textarea { flex: 1; min-height: 340px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--mono); font-size: 0.75rem; line-height: 1.7; padding: 1rem 1.125rem; resize: none; outline: none; transition: border-color 0.15s; width: 100%; }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  textarea[readonly] { color: var(--green); background: rgba(74,222,154,0.03); border-color: rgba(74,222,154,0.15); cursor: default; }
  textarea::placeholder { color: var(--text3); }

  .controls { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  button { font-family: var(--display); font-weight: 700; font-size: 0.8rem; letter-spacing: 0.04em; cursor: pointer; border-radius: 7px; border: none; padding: 0.6rem 1.4rem; transition: all 0.15s; }
  .btn-convert { background: var(--accent); color: white; position: relative; overflow: hidden; }
  .btn-convert::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%); pointer-events: none; }
  .btn-convert:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,109,250,0.4); }
  .btn-convert:active { transform: translateY(0); }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); color: var(--text); }
  .btn-copy { background: rgba(74,222,154,0.1); color: var(--green); border: 1px solid rgba(74,222,154,0.25); }
  .btn-copy:hover { background: rgba(74,222,154,0.18); }
  .copy-flash { font-family: var(--mono); font-size: 0.7rem; color: var(--green); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .copy-flash.show { opacity: 1; }

  .stats-bar { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1.125rem; gap: 0.5rem 1.25rem; flex-wrap: wrap; align-items: center; }
  .stats-bar.visible { display: flex; }
  .stat-item { display: flex; align-items: center; gap: 0.4rem; }
  .stat-label { font-family: var(--mono); font-size: 0.65rem; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-value { font-family: var(--mono); font-size: 0.75rem; font-weight: 700; color: var(--accent2); }
  .stat-sep { color: var(--border2); font-size: 0.7rem; }
  .warn-item { font-family: var(--mono); font-size: 0.7rem; color: var(--amber); display: flex; align-items: center; gap: 0.4rem; width: 100%; }

  .skipped-toggle { font-family: var(--mono); font-size: 0.7rem; color: var(--text3); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline dotted; transition: color 0.15s; font-weight: 400; letter-spacing: 0; border-radius: 0; }
  .skipped-toggle:hover { color: var(--text2); background: none; transform: none; }
  .skipped-lines { display: none; width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 0.875rem; font-family: var(--mono); font-size: 0.68rem; color: var(--text3); line-height: 1.8; word-break: break-all; }
  .skipped-lines.open { display: block; }

  .about { border-top: 1px solid var(--border); padding-top: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .about-block { display: flex; flex-direction: column; gap: 0.75rem; }
  .about-title { font-family: var(--mono); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); }
  .about-text { font-size: 0.8rem; color: var(--text2); line-height: 1.75; }
  .about-text b { color: var(--text); font-weight: 700; }
  .rule-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .rule-item { display: flex; gap: 0.75rem; align-items: flex-start; font-size: 0.78rem; color: var(--text2); line-height: 1.6; }
  .rule-chip { flex-shrink: 0; font-family: var(--mono); font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 3px; margin-top: 2px; }
  .chip-tap   { background: rgba(251,191,36,0.12);  color: var(--amber);  border: 1px solid rgba(251,191,36,0.3); }
  .chip-hold  { background: rgba(124,109,250,0.12); color: var(--accent2); border: 1px solid rgba(124,109,250,0.3); }
  .chip-flick { background: rgba(248,113,113,0.12); color: var(--red);    border: 1px solid rgba(248,113,113,0.3); }
  .chip-sky   { background: rgba(74,222,154,0.12);  color: var(--green);  border: 1px solid rgba(74,222,154,0.3); }
  .chip-track { background: rgba(90,88,112,0.3);    color: var(--text2);  border: 1px solid var(--border2); }

  .diagram-area { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
  .diagram-title { padding: 0.6rem 1rem; font-family: var(--mono); font-size: 0.62rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .diagram-canvas { padding: 1rem; flex: 1; }

  footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 1rem 2.5rem; display: flex; align-items: center; gap: 1rem; }
  .footer-left { display: flex; flex-direction: column; gap: 2px; }
  .footer-title { font-size: 0.75rem; font-weight: 700; color: var(--text2); letter-spacing: 0.04em; }
  .footer-sub { font-family: var(--mono); font-size: 0.62rem; color: var(--text3); }
  .footer-link { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; font-family: var(--mono); font-size: 0.62rem; color: var(--text3); text-decoration: none; transition: color 0.15s; }
  .footer-link:hover { color: var(--text2); }
  .footer-link svg { width: 13px; height: 13px; fill: currentColor; opacity: 0.6; }

  @media (max-width: 750px) {
    header { padding: 1.25rem; }
    main { padding: 1rem 1.25rem 1.5rem; }
    .editor-row { grid-template-columns: 1fr; }
    .about { grid-template-columns: 1fr; }
    footer { padding: 0.75rem 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 6h16M4 12h10M4 18h13M17 15l4-3-4-3"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>AFF → SPC Converter</h1>
    <p data-i18n="header-sub"></p>
  </div>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ja')">JA</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <div class="badge">v7.0</div>
  </div>
</header>

<main>
  <div class="settings-bar">
    <span class="setting-label" data-i18n="settings-label"></span>
    <div class="settings-sep"></div>
    <div class="setting-group">
      <span class="setting-label" data-i18n="split-label"></span>
      <input class="setting-input" type="number" id="split-input" value="20" min="1" placeholder="20">
    </div>
  </div>

  <div class="editor-row">
    <div class="pane">
      <div class="pane-header">
        <span class="pane-label" data-i18n="pane-input"></span>
        <span class="pane-tag input-tag">AFF</span>
        <span class="line-count" id="in-count">0 lines</span>
      </div>
      <textarea id="input" spellcheck="false" data-i18n-ph="input-placeholder"></textarea>
    </div>
    <div class="pane">
      <div class="pane-header">
        <span class="pane-label" data-i18n="pane-output"></span>
        <span class="pane-tag output-tag">SPC</span>
        <span class="line-count" id="out-count">0 lines</span>
      </div>
      <textarea id="output" readonly spellcheck="false" data-i18n-ph="output-placeholder"></textarea>
    </div>
  </div>

  <div class="controls">
    <button class="btn-convert" onclick="convert()" data-i18n="btn-convert"></button>
    <button class="btn-copy btn-ghost" onclick="copyOutput()" data-i18n="btn-copy"></button>
    <button class="btn-ghost" onclick="clearAll()" data-i18n="btn-clear"></button>
    <span class="copy-flash" id="copy-flash" data-i18n="copy-flash"></span>
  </div>

  <div class="stats-bar" id="stats"></div>

  <div class="about">
    <div class="about-block">
      <div class="about-title" data-i18n="about-title"></div>
      <p class="about-text" id="about-desc"></p>
      <div class="rule-list" id="rule-list"></div>
    </div>
    <div class="diagram-area">
      <div class="diagram-title" data-i18n="diagram-title"></div>
      <div class="diagram-canvas" style="display:flex;flex-direction:column;gap:8px;padding:0.75rem;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">

let currentLang = 'ja';
function t(key, vars) {
  let s = (I18N[currentLang]||I18N.ja)[key] || key;
  if (vars) Object.entries(vars).forEach(([k,v]) => s = s.replace('{'+k+'}', v));
  return s;
}
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPh);
  });
  document.getElementById('about-desc').innerHTML = t('about-desc');
  const chipClass = {tap:'chip-tap',hold:'chip-hold',track:'chip-track',flick:'chip-flick',sky:'chip-sky'};
  document.getElementById('rule-list').innerHTML = t('about-rules').map(r =>
    `<div class="rule-item"><span class="rule-chip ${chipClass[r.type]||''}">${r.type.toUpperCase()}</span><span>${r.text}</span></div>`
  ).join('');
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase() === currentLang)
  );
}
function setLang(lang) { currentLang = lang; applyLang(); }

// ── Converter ─────────────────────────────────────────────────────────────────
function easingToCurve(e) { return e==='s'?0:e==='si'?1:e==='so'?2:0; }
function formatSpeed(v) { const s=parseFloat(v.toFixed(4)).toString(); return s.includes('.')?s:s+'.0'; }

function snapToCenter(x, split) {
  const ex=x*split, fl=Math.floor(ex), ce=Math.ceil(ex);
  if (fl===ce) return fl;
  return Math.abs(fl-split/2)<=Math.abs(ce-split/2)?fl:ce;
}
function midAndWidth(x1, x2, split) {
  split=split||20;
  let pos=snapToCenter((x1+x2)/2,split);
  const w=Math.round(Math.abs(x2-x1)*split);
  const hw=w/2;
  if (pos-hw<0)     pos=Math.ceil(hw);
  if (pos+hw>split) pos=Math.floor(split-hw);
  return {position:pos, split, width:w};
}

// AFF tap/hold → SPC position & width
// AFF track = center lane position (can be float), width = note width
// SPC position = AFF_track - (width/2 - 0.5), clamped 0~5, width clamped 1~4
function affTrackToSpc(affTrack, affWidth) {
  const w = Math.min(4, Math.max(1, Math.round(affWidth)));
  let pos = Math.round(affTrack - (affWidth/2 - 0.5));
  pos = Math.min(5, Math.max(0, pos));
  return {position: pos, width: w};
}

let lastSkippedLines = [];

function convert() {
  const split = Math.max(1, parseInt(document.getElementById('split-input').value)||20);
  const lines = document.getElementById('input').value.split('\n');
  let baseBpm=null, baseDensity=null;
  lastSkippedLines=[];
  const events=[], allArcs=[];

  for (let raw of lines) {
    const line=raw.trim();
    if (!line) continue;

    // timing(t,bpm,density);
    const tm=line.match(/^timing\((\d+(?:\.\d+)?),([\d.]+),([\d.]+)\);?$/);
    if (tm) {
      const tt=parseFloat(tm[1]),bpm=parseFloat(tm[2]),density=parseFloat(tm[3]);
      if (tt===0){baseBpm=bpm;baseDensity=density;}
      else events.push({timing:tt, text:`track(${tt},${formatSpeed(parseFloat((bpm/(baseBpm||bpm)).toFixed(4)))})`});
      continue;
    }

    // tap: (timing,track); or (timing,track,width);
    const tapM=line.match(/^\((\d+),([\d.]+)(?:,([\d.]+))?\);?$/);
    if (tapM) {
      const tt=parseInt(tapM[1]);
      const track=parseFloat(tapM[2]);
      const width=tapM[3]!==undefined?parseFloat(tapM[3]):1;
      const spc=affTrackToSpc(track,width);
      events.push({timing:tt, text:`tap(${tt},${spc.width},${spc.position})`});
      continue;
    }

    // hold(timing,endtiming,track); or hold(timing,endtiming,track,width);
    const hm=line.match(/^hold\((\d+),(\d+),([\d.]+)(?:,([\d.]+))?\);?$/);
    if (hm) {
      const tt=parseInt(hm[1]),et=parseInt(hm[2]);
      const track=parseFloat(hm[3]);
      const width=hm[4]!==undefined?parseFloat(hm[4]):1;
      const spc=affTrackToSpc(track,width);
      events.push({timing:tt, text:`hold(${tt},${spc.position},${spc.width},${et-tt})`});
      continue;
    }

    // arc
    const am=line.match(/^arc\((\d+),(\d+),([\d.]+),([\d.]+),([a-z]+),([\d.]+),([\d.]+),(\d+),none,(true|false)\);?$/);
    if (am) {
      allArcs.push({
        timing:parseInt(am[1]),endtiming:parseInt(am[2]),
        x_start:parseFloat(am[3]),x_end:parseFloat(am[4]),
        easing:am[5],color:parseInt(am[8]),arctype:am[9]==='true'
      });
      continue;
    }

    lastSkippedLines.push(line);
  }

  // flick
  for (const a of allArcs.filter(a=>!a.arctype)) {
    const mw=midAndWidth(a.x_start,a.x_end,split);
    const dir=a.color===1?4:a.color===0?16:4;
    events.push({timing:a.timing, text:`flick(${a.timing},${mw.position},${mw.split},${mw.width},${dir})`});
  }

  // skyarea: group by timing:endtiming
  const areaGroups=new Map();
  for (const a of allArcs.filter(a=>a.arctype)) {
    const key=`${a.timing}:${a.endtiming}`;
    if (!areaGroups.has(key)) areaGroups.set(key,[]);
    areaGroups.get(key).push(a);
  }
  let unpairedCount=0;
  const areaPairs=[];
  for (const [,g] of areaGroups) {
    for (let i=0;i+1<g.length;i+=2) areaPairs.push([g[i],g[i+1]]);
    if (g.length%2!==0) unpairedCount++;
  }
  areaPairs.sort((a,b)=>a[0].timing-b[0].timing);
  let areaNum=0;
  for (const [arcA,arcB] of areaPairs) {
    areaNum++;
    const left =arcA.x_start<=arcB.x_start?arcA:arcB;
    const right=arcA.x_start<=arcB.x_start?arcB:arcA;
    const sp=split;
    const sMw=midAndWidth(left.x_start,right.x_start,sp);
    const eMw=midAndWidth(left.x_end,  right.x_end,  sp);
    const dur=arcA.endtiming-arcA.timing;
    events.push({
      timing:arcA.timing,
      text:`skyarea(${arcA.timing},${sMw.position},${sMw.split},${sMw.width},${eMw.position},${eMw.split},${eMw.width},${easingToCurve(left.easing)},${easingToCurve(right.easing)},${dur},${areaNum})`
    });
  }

  events.sort((a,b)=>a.timing-b.timing);
  const out=[];
  if (baseBpm!==null) out.push(`chart(${baseBpm.toFixed(2)},${baseDensity.toFixed(2)})`);
  for (const e of events) out.push(e.text);

  document.getElementById('output').value=out.join('\n');
  const inN=document.getElementById('input').value.split('\n').filter(l=>l.trim()).length;
  document.getElementById('in-count').textContent=inN+' lines';
  document.getElementById('out-count').textContent=out.length+' lines';

  // stats
  const statsEl=document.getElementById('stats');
  statsEl.classList.add('visible');
  const counts={
    chart:  baseBpm!==null?1:0,
    track:  events.filter(e=>e.text.startsWith('track')).length,
    tap:    events.filter(e=>e.text.startsWith('tap')).length,
    hold:   events.filter(e=>e.text.startsWith('hold')).length,
    flick:  events.filter(e=>e.text.startsWith('flick')).length,
    skyarea:areaPairs.length,
  };
  const warns=[];
  if (baseBpm===null)    warns.push(t('warn-no-chart'));
  if (unpairedCount>0)   warns.push(t('warn-unpaired',{n:unpairedCount}));

  let skippedHtml='';
  if (lastSkippedLines.length>0) {
    skippedHtml=`<span class="warn-item"><button class="skipped-toggle" onclick="toggleSkipped(this)">${t('skipped-show')} (${lastSkippedLines.length})</button></span><div class="skipped-lines" id="skipped-lines">${lastSkippedLines.map(l=>`<div>${esc(l)}</div>`).join('')}</div>`;
  }

  statsEl.innerHTML=
    Object.entries(counts).map(([k,v],i,arr)=>
      `<span class="stat-item"><span class="stat-label">${k}</span><span class="stat-value">${v}</span></span>`+
      (i<arr.length-1?'<span class="stat-sep">·</span>':'')
    ).join('')+
    warns.map(w=>`<span class="warn-item">⚠ ${w}</span>`).join('')+
    skippedHtml;
}

function toggleSkipped(btn) {
  const box=document.getElementById('skipped-lines');
  const open=box.classList.toggle('open');
  btn.textContent=open?t('skipped-hide'):t('skipped-show')+` (${lastSkippedLines.length})`;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyOutput() {
  const val=document.getElementById('output').value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(()=>{
    const f=document.getElementById('copy-flash');
    f.classList.add('show');
    setTimeout(()=>f.classList.remove('show'),1800);
  }).catch(()=>{document.getElementById('output').select();document.execCommand('copy');});
}

function clearAll() {
  document.getElementById('input').value='';
  document.getElementById('output').value='';
  document.getElementById('in-count').textContent='0 lines';
  document.getElementById('out-count').textContent='0 lines';
  document.getElementById('stats').classList.remove('visible');
  lastSkippedLines=[];
}

document.getElementById('input').addEventListener('input',()=>{
  const n=document.getElementById('input').value.split('\n').filter(l=>l.trim()).length;
  document.getElementById('in-count').textContent=n+' lines';
});

applyLang();
</script>
</body>
</html>
